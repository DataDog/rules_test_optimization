version: 2
updates:
  # Keep workflow pins and Python tooling dependencies updated.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"

  - package-ecosystem: "pip"
    directory: "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"

  - package-ecosystem: "pip"
    directory: "/examples/single_service/src/python-project"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "examples"
    commit-message:
      prefix: "deps(example-python)"

  - package-ecosystem: "gomod"
    directory: "/examples/single_service/src/go-project"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
      - "examples"
    commit-message:
      prefix: "deps(example-go)"
