name: rules_go patch extended

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: rules-go-patch-extended-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rules-go-patch-extended:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.25.0"

      - name: Install Bazelisk
        shell: bash
        run: |
          GO111MODULE=on go install github.com/bazelbuild/bazelisk@v1.28.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run extended vendored rules_go patch coverage
        shell: bash
        run: ./tools/dev/run_rules_go_patch_extended.sh
