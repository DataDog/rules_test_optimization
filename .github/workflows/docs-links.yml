name: Docs Link Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --glob
            --no-progress
            --verbose
            --exclude-mail
            --accept 429
            --max-retries 2
            --retry-wait-time 2
            README.md
            docs/**/*.md
            examples/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
