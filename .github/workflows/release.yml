name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-validation:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run core Bazel tests
        shell: bash
        run: ./bazelw test //tools/...

      - name: Run companion Bazel tests (go module)
        shell: bash
        run: |
          (
            cd modules/go &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Run companion Bazel tests (python module)
        shell: bash
        run: |
          (
            cd modules/python &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Run companion Bazel tests (java module)
        shell: bash
        run: |
          (
            cd modules/java &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Run companion Bazel tests (nodejs module)
        shell: bash
        run: |
          (
            cd modules/nodejs &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Run companion Bazel tests (dotnet module)
        shell: bash
        run: |
          (
            cd modules/dotnet &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Run companion Bazel tests (ruby module)
        shell: bash
        run: |
          (
            cd modules/ruby &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
          )

      - name: Build and test examples
        shell: bash
        run: |
          ./bazelw build //examples/...
          ./bazelw test //examples/...

      - name: Run mock server integration tests
        timeout-minutes: 20
        shell: bash
        run: ./tools/tests/integration/run_mock_server_tests.sh

      - name: Release checklist reminder
        shell: bash
        run: |
          echo "Release validation completed."
          echo "Before publishing, follow CONTRIBUTING.md release runbook steps."

  release-hermetic:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Bazel tests (hermetic lane)
        timeout-minutes: 25
        shell: bash
        run: |
          ./bazelw test //tools/... \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --incompatible_strict_action_env \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles

      - name: Run Bazel tests (go companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/go &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

      - name: Run Bazel tests (python companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/python &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

      - name: Run Bazel tests (java companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/java &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

      - name: Run Bazel tests (nodejs companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/nodejs &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

      - name: Run Bazel tests (dotnet companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/dotnet &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

      - name: Run Bazel tests (ruby companion hermetic lane)
        timeout-minutes: 10
        shell: bash
        run: |
          (
            cd modules/ruby &&
            ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
          )

  release-shared-validation:
    uses: ./.github/workflows/shared-validation.yml
    with:
      python_version: "3.11"
      run_buildifier: false
      verify_bazelrc_sync: false
      run_gofmt: true
      run_powershell_lint: true
      run_schema_validation: true
      run_fixture_json_validation: false
      run_schema_parser_parity: true

  release-docs-links:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check markdown links
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2.4.1
        with:
          args: >-
            --glob
            --no-progress
            --verbose
            --exclude-mail
            --accept 429
            --max-retries 2
            --retry-wait-time 2
            README.md
            CONTRIBUTING.md
            AGENTS.md
            CHANGELOG.md
            SECURITY.md
            docs/**/*.md
            examples/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-platform-smoke:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ensure jq is available (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command jq -ErrorAction SilentlyContinue) {
            jq --version
            exit 0
          }
          choco install jq --no-progress -y
          jq --version

      - name: Run mock server integration tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: ./tools/tests/integration/run_mock_server_tests.sh

      - name: Run mock server integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/tests/integration/run_mock_server_tests.ps1
