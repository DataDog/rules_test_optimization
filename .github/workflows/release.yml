name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-validation:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python tooling dependencies
        shell: bash
        run: python3 -m pip install -r tools/requirements.txt

      - name: Verify core/go module versions are aligned
        shell: bash
        run: python3 tools/dev/check_module_versions.py

      - name: Verify schema files are in sync
        shell: bash
        run: python3 tools/core/schemas/sync_agentless_schema.py --check

      - name: Run core Bazel tests
        shell: bash
        run: ./bazelw test //tools/...

      - name: Run companion Bazel tests
        shell: bash
        run: |
          cd modules/go &&
          ../../bazelw test //... \
          --override_module=datadog-rules-test-optimization=../..

      - name: Build and test examples
        shell: bash
        run: |
          ./bazelw build //examples/...
          ./bazelw test //examples/...

      - name: Release checklist reminder
        shell: bash
        run: |
          echo "Release validation completed."
          echo "Before publishing, follow CONTRIBUTING.md release runbook steps."
