name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  bazel-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Fresh-run policy: keep this lane intentionally cacheless so every CI run
      # re-evaluates repository rules from scratch.
      # Guardrail: do not add Bazel cache steps (actions/cache, disk cache,
      # remote cache) here without explicit maintainer approval.
      - name: Run Bazel tests
        shell: bash
        run: ./bazelw test //tools/...

      - name: Run Bazel tests (go companion module)
        shell: bash
        run: |
          cd modules/go &&
          ../../bazelw test //... \
          --override_module=datadog-rules-test-optimization=../..

      - name: Build examples
        shell: bash
        run: ./bazelw build //examples/...

      - name: Test examples
        shell: bash
        run: ./bazelw test //examples/...

      - name: Exercise single-service runtests script (dry-run)
        shell: bash
        run: RUNTESTS_DRY_RUN=1 bash ./examples/single_service/runtests.sh

      - name: Exercise multi-service runtests script (dry-run)
        shell: bash
        run: RUNTESTS_DRY_RUN=1 bash ./examples/multi_service/runtests.sh

      # Exercises the uploader end-to-end against a local mock server.
      - name: Run mock server integration tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./tools/tests/integration/run_mock_server_tests.sh

      # Runs the same integration harness on Windows.
      - name: Run mock server integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/tests/integration/run_mock_server_tests.ps1

  coverage-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run tools coverage report
        shell: bash
        run: ./bazelw coverage //tools/... --combined_report=lcov

      - name: Enforce minimum tools coverage signal
        shell: bash
        env:
          TOOLS_COVERAGE_MIN: "1.0"
        run: |
          COVERAGE_FILE="$(./bazelw info output_path)/_coverage/_coverage_report.dat"
          if [[ ! -s "$COVERAGE_FILE" ]]; then
            echo "error: coverage report missing at $COVERAGE_FILE"
            exit 1
          fi
          COVERAGE_FILE="$COVERAGE_FILE" python3 - <<'PY'
          import os
          import sys

          path = os.environ["COVERAGE_FILE"]
          min_pct = float(os.environ.get("TOOLS_COVERAGE_MIN", "1.0"))
          lines_found = 0
          lines_hit = 0
          with open(path, "r", encoding="utf-8") as handle:
              for line in handle:
                  if line.startswith("LF:"):
                      lines_found += int(line[3:].strip())
                  elif line.startswith("LH:"):
                      lines_hit += int(line[3:].strip())

          if lines_found <= 0:
              print("error: coverage report has zero instrumented lines")
              sys.exit(1)

          pct = (lines_hit / lines_found) * 100.0
          print(f"tools coverage: {lines_hit}/{lines_found} lines hit ({pct:.2f}%)")
          if pct < min_pct:
              print(
                  f"error: tools coverage {pct:.2f}% is below minimum {min_pct:.2f}%"
              )
              sys.exit(1)
          PY

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install ShellCheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint repository shell scripts
        shell: bash
        run: |
          shellcheck --severity=error \
            bazelw \
            examples/single_service/runtests.sh \
            examples/multi_service/runtests.sh \
            tools/tests/integration/*.sh \
            tools/tests/python/run_python_tools_test.sh

  schema-sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify core/go module versions are aligned
        shell: bash
        run: python3 tools/dev/check_module_versions.py

      - name: Verify schema files are in sync
        shell: bash
        run: python3 tools/core/schemas/sync_agentless_schema.py --check

  powershell-lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            if (-not (Get-PackageProvider -ListAvailable -Name NuGet -ErrorAction SilentlyContinue)) {
              Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
          }

      - name: Lint integration PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path "tools/tests/integration/*.ps1" -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found lint errors."
          }

  # Policy: keep the hermetic lane Linux-only for now.
  # Rationale: sandbox/network-blocking semantics are most reliable on Linux;
  # macOS/Windows are still covered by the standard test+integration matrix.
  bazel-tests-hermetic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Bazel tests (hermetic lane)
        shell: bash
        run: |
          ./bazelw test //tools/... \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles

      - name: Run Bazel tests (go companion hermetic lane)
        shell: bash
        run: |
          cd modules/go &&
          ../../bazelw test //... \
          --override_module=datadog-rules-test-optimization=../.. \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles
