name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  bazel-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bazel tests
        shell: bash
        run: ./bazelw test //tools/...

      - name: Run Bazel tests (go companion module)
        shell: bash
        run: |
          cd modules/go &&
          ../../bazelw test //... \
          --override_module=datadog-rules-test-optimization=../..

      - name: Build examples
        shell: bash
        run: ./bazelw build //examples/...

      - name: Test examples
        shell: bash
        run: ./bazelw test //examples/...

      - name: Exercise single-service runtests script (dry-run)
        shell: bash
        run: RUNTESTS_DRY_RUN=1 bash ./examples/single_service/runtests.sh

      # Exercises the uploader end-to-end against a local mock server.
      - name: Run mock server integration tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./tools/tests/integration/run_mock_server_tests.sh

      # Runs the same integration harness on Windows.
      - name: Run mock server integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/tests/integration/run_mock_server_tests.ps1

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint integration shell scripts
        shell: bash
        run: shellcheck --severity=error tools/tests/integration/*.sh

  schema-sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify core/go module versions are aligned
        shell: bash
        run: python3 tools/dev/check_module_versions.py

      - name: Verify schema files are in sync
        shell: bash
        run: python3 tools/core/schemas/sync_agentless_schema.py --check

  powershell-lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            if (-not (Get-PackageProvider -ListAvailable -Name NuGet -ErrorAction SilentlyContinue)) {
              Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
          }

      - name: Lint integration PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path "tools/tests/integration/*.ps1" -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found lint errors."
          }

  # Policy: keep the hermetic lane Linux-only for now.
  # Rationale: sandbox/network-blocking semantics are most reliable on Linux;
  # macOS/Windows are still covered by the standard test+integration matrix.
  bazel-tests-hermetic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Bazel tests (hermetic lane)
        shell: bash
        run: |
          ./bazelw test //tools/... \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles

      - name: Run Bazel tests (go companion hermetic lane)
        shell: bash
        run: |
          cd modules/go &&
          ../../bazelw test //... \
          --override_module=datadog-rules-test-optimization=../.. \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles
