name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  BUILDIFIER_VERSION: "8.2.1"
  BUILDIFIER_SHA256_LINUX_AMD64: "6ceb7b0ab7cf66fceccc56a027d21d9cc557a7f34af37d2101edb56b92fcfa1a"

concurrency:
  # Keep one active run per workflow/ref to avoid wasting CI minutes when
  # multiple commits are pushed quickly to the same branch.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bazel-tests:
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Fresh-run policy: keep this lane intentionally cacheless so every CI run
      # re-evaluates repository rules from scratch.
      # Guardrail: do not add Bazel cache steps (actions/cache, disk cache,
      # remote cache) here without explicit maintainer approval.
      - name: Run Bazel tests
        timeout-minutes: 25
        shell: bash
        run: ./bazelw test //tools/...

      - name: Run Bazel tests (companion modules)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 25
        shell: bash
        run: |
          for module in go python java nodejs dotnet ruby; do
            (
              cd "modules/${module}" &&
              ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../..
            )
          done

      - name: Build examples
        timeout-minutes: 10
        shell: bash
        run: ./bazelw build //examples/...

      - name: Test examples
        timeout-minutes: 10
        shell: bash
        run: ./bazelw test //examples/...

      - name: Exercise single-service runtests script (dry-run)
        shell: bash
        # Keep CI deterministic and secret-free: this validates script wiring
        # and command construction without requiring live Datadog credentials.
        run: RUNTESTS_DRY_RUN=1 bash ./examples/single_service/runtests.sh

      - name: Exercise multi-service runtests script (dry-run)
        shell: bash
        # Keep CI deterministic and secret-free: this validates script wiring
        # and command construction without requiring live Datadog credentials.
        run: RUNTESTS_DRY_RUN=1 bash ./examples/multi_service/runtests.sh

      # Exercises the uploader end-to-end against a local mock server.
      - name: Run mock server integration tests (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 15
        shell: bash
        run: ./tools/tests/integration/run_mock_server_tests.sh

      - name: Ensure jq is available (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Get-Command jq -ErrorAction SilentlyContinue) {
            jq --version
            exit 0
          }
          choco install jq --no-progress -y
          jq --version

      # Runs the same integration harness on Windows.
      - name: Run mock server integration tests (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 15
        shell: pwsh
        run: ./tools/tests/integration/run_mock_server_tests.ps1

  workspace-compat:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate WORKSPACE mode loading
        shell: bash
        run: |
          tmp_ws="$(mktemp -d)"
          trap 'rm -rf "$tmp_ws"' EXIT

          cat >"$tmp_ws/WORKSPACE" <<EOF
          load("@bazel_tools//tools/build_defs/repo:local.bzl", "local_repository")

          local_repository(
              name = "datadog-rules-test-optimization",
              path = "${GITHUB_WORKSPACE}",
          )

          local_repository(
              name = "datadog-rules-test-optimization-go",
              path = "${GITHUB_WORKSPACE}/modules/go",
          )

          load("@datadog-rules-test-optimization//tools/core:test_optimization_sync.bzl", "test_optimization_sync")
          EOF

          cat >"$tmp_ws/BUILD.bazel" <<'EOF'
          load("@datadog-rules-test-optimization-go//tests:example_stub_repo.bzl", "render_stub_build_for_tests")
          load("@datadog-rules-test-optimization//tools/core:test_optimization_uploader.bzl", "dd_payload_uploader")

          filegroup(
              name = "workspace_smoke",
              srcs = [],
          )
          EOF

          (
            cd "$tmp_ws"
            # WORKSPACE mode validation is pinned to Bazel 8 because Bazel 9
            # deprecates/disables this path during the migration window.
            USE_BAZEL_VERSION=8.4.1 \
              "${GITHUB_WORKSPACE}/bazelw" query --noenable_bzlmod --enable_workspace //:workspace_smoke
          )

  coverage-tools:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python tooling dependencies
        shell: bash
        run: python3 -m pip install --require-hashes -r tools/requirements.txt

      - name: Verify Python tooling tests through Bazel
        shell: bash
        run: ./bazelw test //tools/tests/python:python_tools_test

      - name: Enforce minimum tools coverage signal
        shell: bash
        env:
          TOOLS_COVERAGE_MIN: "40.0"
        run: |
          # Coverage is collected via Python's trace module for file-level signal,
          # while the Bazel step above keeps runtime wiring parity verified.
          TOOLS_COVERAGE_MIN="$TOOLS_COVERAGE_MIN" python3 - <<'PY'
          import os
          import pathlib
          import runpy
          import sys
          import trace

          repo_root = pathlib.Path.cwd()
          min_raw = os.environ.get("TOOLS_COVERAGE_MIN")
          if min_raw is None or min_raw.strip() == "":
              print("error: TOOLS_COVERAGE_MIN must be provided")
              sys.exit(2)
          min_pct = float(min_raw)
          targets = [
              repo_root / "tools/core/validate_payload_schema.py",
              repo_root / "tools/core/schemas/sync_agentless_schema.py",
              repo_root / "tools/dev/check_module_versions.py",
              repo_root / "tools/dev/lint_uploader_templates.py",
          ]

          tracer = trace.Trace(count=True, trace=False)
          exit_code = 0
          try:
              tracer.runctx(
                  'runpy.run_path("tools/tests/python/test_python_tools.py", run_name="__main__")',
                  {"runpy": runpy},
                  {},
              )
          except SystemExit as exc:
              code = exc.code
              if code is None:
                  exit_code = 0
              elif isinstance(code, int):
                  exit_code = code
              else:
                  print(code)
                  exit_code = 1

          if exit_code != 0:
              sys.exit(exit_code)

          counts = tracer.results().counts
          lines_found = 0
          lines_hit = 0

          for target in targets:
              target_path = target.resolve()
              source_lines = target_path.read_text(encoding="utf-8").splitlines()
              executable_lines = [
                  idx
                  for idx, line in enumerate(source_lines, start=1)
                  if line.strip() and not line.lstrip().startswith("#")
              ]
              hit_lines = set()
              for (filename, lineno), count in counts.items():
                  if count <= 0:
                      continue
                  try:
                      if pathlib.Path(filename).resolve() == target_path:
                          hit_lines.add(lineno)
                  except OSError:
                      continue
              found = len(executable_lines)
              hit = len([ln for ln in executable_lines if ln in hit_lines])
              lines_found += found
              lines_hit += hit
              print(f"tools coverage file: {target_path} -> {hit}/{found} lines hit")

          if lines_found <= 0:
              print("error: tools coverage probe found zero executable lines")
              sys.exit(1)

          pct = (lines_hit / lines_found) * 100.0
          print(f"tools coverage total: {lines_hit}/{lines_found} lines hit ({pct:.2f}%)")
          if pct < min_pct:
              print(
                  f"error: tools coverage {pct:.2f}% is below minimum {min_pct:.2f}%"
              )
              sys.exit(1)
          PY

  shell-lint:
    uses: ./.github/workflows/shared-validation.yml
    with:
      python_version: "3.11"
      run_buildifier: true
      verify_bazelrc_sync: true

  gofmt-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify Go files are gofmt formatted
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if (( ${#go_files[@]} == 0 )); then
            exit 0
          fi
          unformatted="$(gofmt -l "${go_files[@]}")"
          if [[ -n "${unformatted}" ]]; then
            echo "error: gofmt found unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

  schema-sync-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python tooling dependencies
        shell: bash
        run: python3 -m pip install --require-hashes -r tools/requirements.txt

      - name: Verify core/companion module versions are aligned
        shell: bash
        run: python3 tools/dev/check_module_versions.py

      - name: Verify .bazelversion parity
        shell: bash
        run: python3 tools/dev/check_bazelversion_sync.py

      - name: Validate integration fixture and snapshot JSON
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          files = sorted(Path("tools/tests/integration/fixtures").glob("*.json"))
          files += sorted(Path("tools/tests/integration/snapshots").glob("*.json"))
          for path in files:
            with path.open("r", encoding="utf-8") as handle:
              json.load(handle)
            print(f"valid json: {path}")
          PY

      - name: Verify schema files are in sync
        shell: bash
        run: python3 tools/core/schemas/sync_agentless_schema.py --check

      - name: Verify schema parser parity (PyYAML vs Ruby)
        shell: bash
        run: python3 tools/core/schemas/check_schema_parser_parity.py

  powershell-lint:
    timeout-minutes: 15
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            if (-not (Get-PackageProvider -ListAvailable -Name NuGet -ErrorAction SilentlyContinue)) {
              Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
          }

      - name: Lint integration PowerShell scripts
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path "tools/tests/integration/*.ps1" -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found lint errors."
          }

      - name: Lint embedded uploader templates (PowerShell lane)
        shell: pwsh
        run: python tools/dev/lint_uploader_templates.py --skip-shellcheck

  # Policy: keep the hermetic lane Linux-only for now.
  # Rationale: sandbox/network-blocking semantics are most reliable on Linux;
  # macOS/Windows are still covered by the standard test+integration matrix.
  bazel-tests-hermetic:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Bazel tests (hermetic lane)
        timeout-minutes: 25
        shell: bash
        run: |
          ./bazelw test //tools/... \
          --spawn_strategy=sandboxed \
          --strategy=TestRunner=sandboxed \
          --incompatible_strict_action_env \
          --sandbox_default_allow_network=false \
          --modify_execution_info=TestRunner=+block-network \
          --test_env=TZ=UTC \
          --test_env=LANG=C \
          --test_env=LC_ALL=C \
          --enable_runfiles

      - name: Run Bazel tests (companion hermetic lane)
        timeout-minutes: 25
        shell: bash
        run: |
          for module in go python java nodejs dotnet ruby; do
            (
              cd "modules/${module}" &&
              ../../bazelw test //... \
              --override_module=datadog-rules-test-optimization=../.. \
              --spawn_strategy=sandboxed \
              --strategy=TestRunner=sandboxed \
              --incompatible_strict_action_env \
              --sandbox_default_allow_network=false \
              --modify_execution_info=TestRunner=+block-network \
              --test_env=TZ=UTC \
              --test_env=LANG=C \
              --test_env=LC_ALL=C \
              --enable_runfiles
            )
          done
